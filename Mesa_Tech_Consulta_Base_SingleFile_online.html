
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Base Mesa Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#0b1020; --card:#0e152b; --fg:#ffffff; --muted:#cbd6ec; --accent:#7cb8ff; --border:#1a2640; --input:#0f1a34; --chip:#122045; --chip-fg:#eaf1ff; --hover:rgba(255,255,255,.08); --btn-bg:#0f1a34; --btn-fg:#ffffff; --btn-br:#1c2a4a; --btn-hover:#17264a; --row-a:#0f2148; --row-b:#0b1a3a; --shadow:0 10px 30px rgba(0,0,0,.35); }
    body{margin:0;font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial,'Noto Sans','Liberation Sans',sans-serif;background:var(--bg);color:var(--fg)}
    main{padding:16px 24px 24px 24px;min-height:100vh;display:grid;grid-template-rows:auto auto 1fr;gap:16px}
    .hero{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:18px;border:1px solid var(--border);border-radius:14px;background:var(--card);color:var(--fg)}
    .hero h1{margin:0;font-weight:800;font-size:clamp(24px,4vw,36px)}
    .hero p{margin:0;color:var(--muted)}
    .filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center}
    .chip{display:inline-flex;align-items:center;gap:8px;background:var(--chip);color:var(--chip-fg);padding:8px 10px;border:1px solid var(--border);border-radius:10px}
    .chip span{font-size:12px;opacity:.95}
    .chip select,.chip input{background:transparent;color:var(--fg);border:none;outline:none;font-size:13px}
    .chip input::placeholder{color:#c7cfe6; opacity:.8}
    .tablewrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
    .head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-size:12px}
    .bar{display:flex;align-items:center;gap:8px;position:relative}
    .btn{border:1px solid var(--btn-br);background:var(--btn-bg);color:var(--btn-fg);padding:8px 12px;border-radius:10px;cursor:pointer;transition:.15s ease;white-space:nowrap}
    .btn:hover{background:var(--btn-hover)}
    .colpicker{position:absolute;right:10px;top:38px;width:300px;max-height:360px;overflow:auto;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:10px;display:none}
    .colpicker.show{display:block}
    .colpicker h4{margin:4px 0 8px 0;font-size:13px;color:var(--muted)}
    .colgrid{display:grid;grid-template-columns:1fr;gap:6px}
    .colgrid label{display:flex;align-items:center;gap:8px;font-size:13px}
    .colactions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
    .scroller{overflow:auto;flex:1}
    table{width:100%;border-collapse:separate;border-spacing:0; font-size:13px;}
    thead th{position:sticky;top:0;z-index:1;background:var(--card);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--fg);padding:10px 12px;border-bottom:1px solid var(--border);user-select:none;cursor:pointer}
    tbody td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--fg)}
    tbody tr:nth-child(odd){background:var(--row-a)}
    tbody tr:nth-child(even){background:var(--row-b)}
    tbody tr:hover td{background:var(--hover)}
    .thflex{display:flex;align-items:center;gap:6px}
    .badge{font-size:10px;opacity:.95;border:1px solid var(--border);padding:0 4px;border-radius:6px}
  </style>
  <style>
    body{transition:background-color .6s ease, color .6s ease;}
    .page-bg{position:fixed; inset:0; z-index:-1; background:url('FUNDO_26.png') center/cover no-repeat; animation:bgmove 18s ease-in-out infinite alternate; opacity:.35;}
    @keyframes bgmove{from{transform:scale(1) translateY(0);} to{transform:scale(1.08) translateY(-12px);}}
    body.light{--bg:#f5f7fa;--card:#ffffff;--fg:#111;--muted:#555;--chip:#e1e7ff;--chip-fg:#111;--btn-bg:#dfe4ff;--btn-fg:#000;--row-a:#eef2ff;--row-b:#e4e8f8;}
    .chip select, .chip option{background:var(--card); color:var(--fg);} 
    .chip{background:var(--card);} 
    .float-menu{position:fixed; bottom:20px; right:20px; background:var(--card); padding:12px; border-radius:14px; box-shadow:0 4px 14px rgba(0,0,0,.4); transition:.3s;}
    .float-menu.collapsed{height:40px; overflow:hidden;}
    .float-menu button{margin:4px; padding:8px 12px; border-radius:10px; background:var(--btn-bg); color:var(--btn-fg); border:1px solid var(--btn-br); cursor:pointer; transition:.3s;}
    .float-menu button:hover{transform:translateY(-2px);}    
  </style>
  <style>
    :root { --font-scale: 1; }
    @media (prefers-reduced-motion: no-preference) { html { transition: font-size .15s ease; } }
    body { font-size: calc(16px * var(--font-scale)); }
    table { font-size: calc(13px * var(--font-scale)) !important; }
    thead th { font-size: calc(12px * var(--font-scale)) !important; }
    tbody td { font-size: calc(13px * var(--font-scale)) !important; }
    .badge { font-size: calc(10px * var(--font-scale)) !important; }
    .chip span { font-size: calc(12px * var(--font-scale)) !important; }
    .chip select, .chip input { font-size: calc(13px * var(--font-scale)) !important; }
    .btn { font-size: calc(13px * var(--font-scale)) !important; }
    .hero h1 { font-size: calc(28px * var(--font-scale)) !important; }
    .hero p { font-size: calc(14px * var(--font-scale)) !important; }
    .head { font-size: calc(12px * var(--font-scale)) !important; }
    thead th:nth-child(1), tbody td:nth-child(1), body.light thead th:nth-child(1), body.light tbody td:nth-child(1){ color:#FF7A00 !important; font-weight:700 !important; }
    thead th:nth-child(3), tbody td:nth-child(3), body.light thead th:nth-child(3), body.light tbody td:nth-child(3){ color:#FF7A00 !important; font-weight:700 !important; }
    thead th:nth-child(6), tbody td:nth-child(6){ color:#39FF14 !important; }
    body.light thead th:nth-child(6), body.light tbody td:nth-child(6){ color:#FF7A00 !important; }
  </style>
  <style>
    table thead th, table tbody td{ border-right: none !important; }
    table thead th{ border-bottom: 2px solid var(--btn-br) !important; }
    table tbody td{ border-bottom: 2px solid var(--btn-br) !important; }
    body.light table thead th, body.light table tbody td{ border-bottom: 2px solid #A7B4D6 !important; }
  </style>

<!-- Dados agora sincronizados online via EXCEL_URL + fallback EXCEL_B64 (sem alterar layout/consulta) -->
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>
  <div class="float-menu collapsed" id="fm">
    <button id="toggleMenu">≡</button>
    <button id="toggleTheme">Tema claro/escuro</button>
    <button id="incFont">A+</button>
    <button id="decFont">A-</button>
  </div>
  <main>
    <section class="hero"> <h1>Mesa Tech</h1> <p>Consulta de base</p> </section>

    <div class="filters">
      <div class="chip"><span>SISTEMA</span><select id="fSistema"></select></div>
      <div class="chip"><span>FILA/REGRA ITSM</span><select id="fFila"></select></div>
      <div class="chip"><span>PLANTÃO</span><select id="fPlantao"></select></div>
      <div class="chip"><span>MANAGER</span><select id="fManager"></select></div>
      <div class="chip" style="min-width:280px;flex:1"><span>BUSCA</span><input id="q" type="text" placeholder="Buscar em todas as colunas"/></div>
    </div>

    <section class="tablewrap">
      <div class="head">
        <div>Clique no cabeçalho para ordenar. Use <b>Shift</b> para ordenação por múltiplas colunas.</div>
        <div class="bar">
          <button class="btn" id="colsBtn" type="button">Colunas</button>
          <button class="btn" id="clear" type="button">Limpar filtros</button>
          <button class="btn" id="export" type="button">Exportar Excel (filtrado)</button>
          <div class="colpicker" id="colPicker"> 
            <h4>Selecionar colunas</h4>
            <div class="colactions"> <button class="btn" id="colAll" type="button">Todas</button> <button class="btn" id="colNone" type="button">Nenhuma</button> </div>
            <div class="colgrid" id="colGrid"></div>
          </div>
        </div>
      </div>
      <div class="scroller">
        <table> <thead id="thead"></thead> <tbody id="tbody"></tbody> </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  // === Fonte online (sincronizada) ===
  // URL do Excel hospedado no GitHub (raw)
  const EXCEL_URL = 'https://raw.githubusercontent.com/Gots91/Ambiente-Mesa-Tech-OFICIAL-/main/Mesa_Tech_Base.xlsx';

  // Carrega workbook do EXCEL_URL; se falhar, usa o EXCEL_B64 embutido
  async function loadWorkbook() {
    try {
      const bust = EXCEL_URL + (EXCEL_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
      const res = await fetch(bust, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const buf = await res.arrayBuffer();
      return XLSX.read(buf, { type: 'array' });
    } catch (err) {
      console.warn('Falha ao buscar Excel online, usando Base64 embutido.', err);
      // Fallback: usa EXCEL_B64 já presente na página
      const bin = atob(EXCEL_B64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; ++i) bytes[i] = bin.charCodeAt(i);
      return XLSX.read(bytes, { type: 'array' });
    }
  }

  const MAP_LABEL_TO_COL = {
    sistema: 'SISTEMA',
    fila: 'FILA DO OFENSOR',
    plantao: 'PLANTÃO',
    manager: 'MANAGER'
  };

  let RAW_ROWS = [];
  let VISIBLE_COLS = [];
  let SORT_STATE = [];

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => Array.from(document.querySelectorAll(sel));

  function unique(values){
    return Array.from(new Set(values.filter(v => v !== undefined && v !== null && String(v).trim() !== ''))).sort((a,b)=>String(a).localeCompare(String(b),'pt-BR'));
  }
  function natural(str){ return String(str ?? '').normalize('NFD').replace(/\p{Diacritic}/gu,'').toLowerCase(); }

  async function parseXlsxBase64(b64){
    const wb = await loadWorkbook();
    const ws = wb.Sheets[wb.SheetNames[0]];
    return XLSX.utils.sheet_to_json(ws, {defval:'', raw:false});
  }

  function boot(){
    if(!RAW_ROWS || !RAW_ROWS.length){ renderEmpty(); return; }
    VISIBLE_COLS = Object.keys(RAW_ROWS[0]);
    buildHeaders(VISIBLE_COLS);
    buildFilters();
    buildColumnPicker();
    renderRows();
  }

  function renderEmpty(){
    $('#thead').innerHTML = '';
    $('#tbody').innerHTML = '<tr><td style="padding:20px">Nenhum dado carregado</td></tr>';
  }

  function buildHeaders(cols){
    const ths = cols.map((c,i)=> `<th data-key="${c}"><div class="thflex">${c} <span class="badge" id="sort-${i}"></span></div></th>`).join('');
    $('#thead').innerHTML = `<tr>${ths}</tr>`;
    $$('#thead th').forEach(th=>{
      th.addEventListener('click',(ev)=>{
        const key = th.dataset.key;
        const multi = ev.shiftKey;
        applySort(key, multi);
      })
    });
  }

  function applySort(key, multi){
    if(!multi) SORT_STATE = [];
    const idx = SORT_STATE.findIndex(s=>s.key===key);
    if(idx>=0){
      const cur = SORT_STATE[idx];
      cur.dir = cur.dir==='asc' ? 'desc' : (cur.dir==='desc' ? null : 'asc');
      if(!cur.dir) SORT_STATE.splice(idx,1);
    } else {
      SORT_STATE.push({key, dir:'asc'});
    }
    updateSortBadges();
    renderRows();
  }

  function updateSortBadges(){
    $$('#thead th .badge').forEach(b=>b.textContent='');
    SORT_STATE.forEach((s, i)=>{
      const th = $(`#thead th[data-key="${CSS.escape(s.key)}"] .badge`);
      if(th) th.textContent = (s.dir==='asc'?'▲':'▼') + ' ' + (i+1);
    })
  }

  function buildFilters(){
    const sOpts = unique(RAW_ROWS.map(r=> r[MAP_LABEL_TO_COL.sistema]));
    const fOpts = unique(RAW_ROWS.map(r=> r[MAP_LABEL_TO_COL.fila]));
    const pOpts = unique(RAW_ROWS.map(r=> r[MAP_LABEL_TO_COL.plantao]));
    const mOpts = unique(RAW_ROWS.map(r=> r[MAP_LABEL_TO_COL.manager]));

    function fill(sel, opts){ sel.innerHTML = '<option value="">Todos</option>' + opts.map(v=>`<option>${String(v).replace(/</g,'&lt;')}</option>`).join(''); }

    fill($('#fSistema'), sOpts); fill($('#fFila'), fOpts); fill($('#fPlantao'), pOpts); fill($('#fManager'), mOpts);

    $('#fSistema').onchange = $('#fFila').onchange = $('#fPlantao').onchange = $('#fManager').onchange = renderRows;
    $('#q').oninput = renderRows;
    $('#clear').onclick = ()=>{ $('#fSistema').value=''; $('#fFila').value=''; $('#fPlantao').value=''; $('#fManager').value=''; $('#q').value=''; renderRows(); };
  }

  function buildColumnPicker(){
    const grid = $('#colGrid');
    grid.innerHTML = '';
    VISIBLE_COLS.forEach((c)=>{
      const id = 'col__'+btoa(c).replace(/=/g,'');
      const row = document.createElement('div');
      row.innerHTML = `<label><input type="checkbox" id="${id}" checked> ${c}</label>`;
      grid.appendChild(row);
      row.querySelector('input').addEventListener('change', ()=> renderRows());
      row.querySelector('input').dataset.key = c;
    });

    $('#colsBtn').onclick = ()=> $('#colPicker').classList.toggle('show');
    $('#colAll').onclick = ()=> { $$('#colGrid input[type=checkbox]').forEach(cb=>{ cb.checked = true; }); renderRows(); };
    $('#colNone').onclick = ()=> { $$('#colGrid input[type=checkbox]').forEach(cb=>{ cb.checked = false; }); renderRows(); };
    document.addEventListener('click', (e)=>{ if(!$('#colPicker').contains(e.target) && e.target!==$('#colsBtn')) $('#colPicker').classList.remove('show');});
  }

  function currentVisibleCols(){
    const cbs = $$('#colGrid input[type=checkbox]');
    const selected = cbs.filter(cb=>cb.checked).map(cb=> cb.dataset.key);
    return selected.length ? selected : VISIBLE_COLS;
  }

  function renderRows(){
    if(!RAW_ROWS.length){ renderEmpty(); return; }
    const cols = currentVisibleCols();

    const fSis = $('#fSistema').value.trim();
    const fFila = $('#fFila').value.trim();
    const fPla = $('#fPlantao').value.trim();
    const fMan = $('#fManager').value.trim();
    const q = natural($('#q').value);

    let rows = RAW_ROWS.filter(r=>{
      const s1 = !fSis || String(r[MAP_LABEL_TO_COL.sistema])===fSis;
      const s2 = !fFila || String(r[MAP_LABEL_TO_COL.fila])===fFila;
      const s3 = !fPla || String(r[MAP_LABEL_TO_COL.plantao])===fPla;
      const s4 = !fMan || String(r[MAP_LABEL_TO_COL.manager])===fMan;
      const free = !q || Object.values(r).some(v=> natural(v).includes(q));
      return s1 && s2 && s3 && s4 && free;
    });

    if(SORT_STATE.length){
      rows.sort((a,b)=>{
        for(const s of SORT_STATE){
          const av = String(a[s.key] ?? '');
          const bv = String(b[s.key] ?? '');
          const cmp = av.localeCompare(bv,'pt-BR',{numeric:true, sensitivity:'base'});
          if(cmp!==0) return s.dir==='asc'?cmp:-cmp;
        }
        return 0;
      });
    }

    buildHeaders(cols);
    updateSortBadges();

    const html = rows.map(r=> '<tr>'+ cols.map(c=> `<td>${String(r[c]??'').replace(/</g,'&lt;')}</td>`).join('') + '</tr>').join('');
    $('#tbody').innerHTML = html || '<tr><td style="padding:20px">Sem resultados</td></tr>';
  }

  // Exportar filtrado
  $('#export').onclick = ()=>{
    if(!RAW_ROWS.length) return;
    const cols = currentVisibleCols();
    const fSis = $('#fSistema').value.trim();
    const fFila = $('#fFila').value.trim();
    const fPla = $('#fPlantao').value.trim();
    const fMan = $('#fManager').value.trim();
    const q = natural($('#q').value);
    let rows = RAW_ROWS.filter(r=>{
      const s1 = !fSis || String(r[MAP_LABEL_TO_COL.sistema])===fSis;
      const s2 = !fFila || String(r[MAP_LABEL_TO_COL.fila])===fFila;
      const s3 = !fPla || String(r[MAP_LABEL_TO_COL.plantao])===fPla;
      const s4 = !fMan || String(r[MAP_LABEL_TO_COL.manager])===fMan;
      const free = !q || Object.values(r).some(v=> natural(v).includes(q));
      return s1 && s2 && s3 && s4 && free;
    });
    if(SORT_STATE.length){
      rows.sort((a,b)=>{
        for(const s of SORT_STATE){
          const av = String(a[s.key] ?? '');
          const bv = String(b[s.key] ?? '');
          const cmp = av.localeCompare(bv,'pt-BR',{numeric:true, sensitivity:'base'});
          if(cmp!==0) return s.dir==='asc'?cmp:-cmp;
        }
        return 0;
      });
    }
    rows = rows.map(r=> Object.fromEntries(cols.map(c=> [c, r[c]])) );
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Filtrado');
    XLSX.writeFile(wb, 'Mesa_Tech_Base_filtrado.xlsx');
  };

  // Theme + fonte
  $('#toggleMenu').onclick = ()=> $('#fm').classList.toggle('collapsed');
  $('#toggleTheme').onclick = ()=> document.body.classList.toggle('light');
  $('#incFont').onclick = ()=>{ const s = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--font-scale')) || 1; document.documentElement.style.setProperty('--font-scale', Math.min(1.35, s+0.05)); };
  $('#decFont').onclick = ()=>{ const s = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--font-scale')) || 1; document.documentElement.style.setProperty('--font-scale', Math.max(.8, s-0.05)); };

  // Bootstrap: parse embutido e iniciar
  (async function init(){
    try {
      RAW_ROWS = await parseXlsxBase64(EXCEL_B64);
      boot();
    } catch(err) {
      console.warn('Falha ao processar Excel embutido:', err);
      renderEmpty();
    }
  })();
  </script>
</body>
</html>
