:root{

*{box-sizing: border-box}
html,body{height:100%}
body{ background:var(--bg); color:var(--fg); margin:0; font-family:'Poppins', Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, 'Helvetica Neue', Arial, 'Noto Sans', 'Liberation Sans', sans-serif;}
header{ display:grid; grid-template-columns: 1fr minmax(360px, 960px) 1fr; align-items:center; gap:12px; padding:16px 20px; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
.brand{ justify-self:start; font-size:20px; font-weight:800; letter-spacing:.2px; white-space:nowrap; }
.theme{ justify-self:end; display:flex; align-items:center; gap:8px; }
.switch{ display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; background:var(--chip); color:var(--chip-fg); cursor:pointer; user-select:none; border:1px solid var(--border); }
.switch input{ display:none; }

.controls{ display:flex; gap:12px; flex-wrap:wrap; padding:12px 20px; background:var(--card); border-bottom:1px solid var(--border); }
label{ font-size:12px; color:var(--muted); display:block; margin-bottom:4px; }
select, input[type=date], input[type=text]{ padding:8px; border:1px solid var(--border); border-radius:8px; background:var(--input); color:var(--fg); }
.toggle, .btn{ cursor:pointer; padding:8px 12px; border-radius:10px; border:1px solid var(--btn-br); color:var(--btn-fg); background:var(--btn-bg);} 
.toggle:hover, .btn:hover{ background:var(--btn-hover); }
.grid{ overflow:auto; max-height: calc(100vh - 180px); }
.table{ width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
th, td{ padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
th{ text-align:left; font-size:12px; color:var(--muted); position:sticky; top:0; background:var(--card); }
.row:hover{ background:var(--hover); }
.footer{ padding:10px 20px; color:var(--muted); font-size:12px; }
</style>

  if(Number.isNaN(d.getTime())) return '';
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm}/${yyyy} ${hh}:${mi}`;
}
function applyFilters() {
  const reg = document.getElementById('regiao').value;
  const est = document.getElementById('estado').value.toLowerCase();
  const anf = document.getElementById('anf').value.toLowerCase();
  const sev = document.getElementById('sev').value;
  const di = document.getElementById('dataIni').value;
  const df = document.getElementById('dataFim').value;
  const diTs = di ? new Date(di+'T00:00:00').getTime() : null;
  const dfTs = df ? new Date(df+'T23:59:59').getTime() : null;
  const out = data.filter(x => {
    const okReg = !reg || (x.region||'').toLowerCase().includes(reg.toLowerCase());
    const okEst = !est || (x.states||'').toLowerCase().includes(est);
    const okAnf = !anf || (x.anfs||'').toLowerCase().includes(anf);
    const okSev = !sev || (x.severity||'') === sev;
    const stTs = x.start ? new Date(x.start).getTime() : null;
    const endTs = x.end ? new Date(x.end).getTime() : stTs;
    const okStart = !diTs || (stTs && stTs >= diTs);
    const okEnd = !dfTs || (endTs && endTs <= dfTs);
    return okReg && okEst && okAnf && okSev && okStart && okEnd;
  });
  render(out);
}
function render(rows) {
  const tbody = document.getElementById('rows');
  tbody.innerHTML = rows.map(x => `
    <tr class="row">
      <td>${fmtDate(x.start)}</td>
      <td>${fmtDate(x.end)}</td>
      <td>${x.severity||''}</td>
      <td>${x.event_code||''}</td>
      <td>${x.region||''}</td>
      <td>${x.states||''}</td>
      <td>${x.anfs||''}</td>
      <td>${x.services||''}</td>
      <td>${x.problema||''}</td>
      <td>${x.cause||''}</td>
      <td>${x.solution||''}</td>
    </tr>`).join('');
}
['regiao','estado','anf','sev','dataIni','dataFim'].forEach(id =>{
  document.getElementById(id).addEventListener('input', applyFilters);
  document.getElementById(id).addEventListener('change', applyFilters);
});
applyFilters();
const toggle = document.getElementById('darkToggle');
let dark = false;
toggle.addEventListener('click', () => {
  dark = !dark;
  document.body.className = dark ? 'dark' : '';
});
</script>
<script>
// Toggle de tema (compatível com index_local_base_v8)
(function(){
  const savedTheme = localStorage.getItem('theme') || 'dark';
  if(savedTheme === 'light') document.documentElement.classList.add('light');
  const tgl = document.getElementById('themeToggle');
  const lbl = document.getElementById('themeLabel');
  if(tgl){
    tgl.checked = (savedTheme === 'light');
    lbl.textContent = savedTheme === 'light' ? 'Claro' : 'Escuro';
    tgl.addEventListener('change', (e)=>{
      const light = e.target.checked; 
      document.documentElement.classList.toggle('light', light);
      localStorage.setItem('theme', light ? 'light':'dark');
      lbl.textContent = light ? 'Claro' : 'Escuro';
    });
  }
})();
</script></body>
</html>
