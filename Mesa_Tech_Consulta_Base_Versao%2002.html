<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Base Mesa Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#0b1020; --card:#0e152b; --fg:#ffffff; --muted:#cbd6ec; --accent:#7cb8ff; --border:#1a2640; --input:#0f1a34; --chip:#122045; --chip-fg:#eaf1ff; --hover:rgba(255,255,255,.08); --btn-bg:#0f1a34; --btn-fg:#ffffff; --btn-br:#1c2a4a; --btn-hover:#17264a; --row-a:#0f2148; --row-b:#0b1a3a; --shadow:0 10px 30px rgba(0,0,0,.35); }
    body{margin:0;font-family:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial,'Noto Sans','Liberation Sans',sans-serif;background:var(--bg);color:var(--fg)}
    main{padding:16px 24px 24px 24px;min-height:100vh;display:grid;grid-template-rows:auto auto 1fr;gap:16px}
    .hero{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:18px;border:1px solid var(--border);border-radius:14px;background:var(--card);color:var(--fg)}
    .hero h1{margin:0;font-weight:800;font-size:clamp(24px,4vw,36px)}
    .hero p{margin:0;color:var(--muted)}

    .filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center}
    .chip{display:inline-flex;align-items:center;gap:8px;background:var(--chip);color:var(--chip-fg);padding:8px 10px;border:1px solid var(--border);border-radius:10px}
    .chip span{font-size:12px;opacity:.95}
    .chip select,.chip input{background:transparent;color:var(--fg);border:none;outline:none;font-size:13px}
    .chip input::placeholder{color:#c7cfe6; opacity:.8}

    .tablewrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
    .head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-size:12px}
    .bar{display:flex;align-items:center;gap:8px;position:relative}
    .btn{border:1px solid var(--btn-br);background:var(--btn-bg);color:var(--btn-fg);padding:8px 12px;border-radius:10px;cursor:pointer;transition:.15s ease;white-space:nowrap}
    .btn:hover{background:var(--btn-hover)}

    .colpicker{position:absolute;right:10px;top:38px;width:300px;max-height:360px;overflow:auto;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:10px;display:none}
    .colpicker.show{display:block}
    .colpicker h4{margin:4px 0 8px 0;font-size:13px;color:var(--muted)}
    .colgrid{display:grid;grid-template-columns:1fr;gap:6px}
    .colgrid label{display:flex;align-items:center;gap:8px;font-size:13px}
    .colactions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}

    .scroller{overflow:auto;flex:1}
    table{width:100%;border-collapse:separate;border-spacing:0; font-size:13px;}
    thead th{position:sticky;top:0;z-index:1;background:var(--card);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--fg);padding:10px 12px;border-bottom:1px solid var(--border);user-select:none;cursor:pointer}
    tbody td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--fg)}
    tbody tr:nth-child(odd){background:var(--row-a)}
    tbody tr:nth-child(even){background:var(--row-b)}
    tbody tr:hover td{background:var(--hover)}
    .thflex{display:flex;align-items:center;gap:6px}
    .badge{font-size:10px;opacity:.95;border:1px solid var(--border);padding:0 4px;border-radius:6px}
  </style>

<style>
body{transition:background-color .6s ease, color .6s ease;}
.page-bg{position:fixed; inset:0; z-index:-1; background:url('FUNDO_26.png') center/cover no-repeat;
 animation:bgmove 18s ease-in-out infinite alternate; opacity:.35;}
@keyframes bgmove{from{transform:scale(1) translateY(0);} to{transform:scale(1.08) translateY(-12px);}}

body.light{--bg:#f5f7fa;--card:#ffffff;--fg:#111;--muted:#555;--chip:#e1e7ff;--chip-fg:#111;--btn-bg:#dfe4ff;--btn-fg:#000;--row-a:#eef2ff;--row-b:#e4e8f8;}

/* remove white select menu */
.chip select, .chip option{background:var(--card); color:var(--fg);} 
.chip{background:var(--card);} 

/* floating button */
.float-menu{position:fixed; bottom:20px; right:20px; background:var(--card); padding:12px; border-radius:14px; box-shadow:0 4px 14px rgba(0,0,0,.4); transition:.3s;}
.float-menu.collapsed{height:40px; overflow:hidden;}
.float-menu button{margin:4px; padding:8px 12px; border-radius:10px; background:var(--btn-bg); color:var(--btn-fg); border:1px solid var(--btn-br); cursor:pointer; transition:.3s;}
.float-menu button:hover{transform:translateY(-2px);}
</style>

<style>

/* === Acessibilidade: escala global de fonte (sem alterar HTML) === */
:root { --font-scale: 1; }
@media (prefers-reduced-motion: no-preference) {
  html { transition: font-size .15s ease; }
}
/* Aplicar escala por contexto principal */
body { font-size: calc(16px * var(--font-scale)); }
/* Componentes com tamanhos fixos em px — sobrescritos para escalar com a variável */
table { font-size: calc(13px * var(--font-scale)) !important; }
thead th { font-size: calc(12px * var(--font-scale)) !important; }
tbody td { font-size: calc(13px * var(--font-scale)) !important; }
.badge { font-size: calc(10px * var(--font-scale)) !important; }
.chip span { font-size: calc(12px * var(--font-scale)) !important; }
.chip select, .chip input { font-size: calc(13px * var(--font-scale)) !important; }
.btn { font-size: calc(13px * var(--font-scale)) !important; }
.hero h1 { font-size: calc(28px * var(--font-scale)) !important; }
.hero p { font-size: calc(14px * var(--font-scale)) !important; }
.head { font-size: calc(12px * var(--font-scale)) !important; }

/* === Cores da coluna SISTEMA por tema === */
thead th:nth-child(1), tbody td:nth-child(1) { color: #FFA500 !important; } /* laranja no modo escuro */
body.light thead th:nth-child(1), body.light tbody td:nth-child(1) { color: #0A2A66 !important; } /* azul escuro no modo claro */

</style>

<style>
/* === Overrides 03: somente bordas entre linhas + OBS laranja no claro === */

/* Remover quaisquer bordas verticais de coluna (caso existam) */
table thead th, table tbody td{
  border-right: none !important;
}

/* Reforçar a borda entre as linhas (thead e tbody) */
table thead th{
  border-bottom: 2px solid var(--btn-br) !important; /* mais marcada no header */
}
table tbody td{
  border-bottom: 2px solid var(--btn-br) !important; /* mais marcada nas linhas */
}
body.light table thead th,
body.light table tbody td{
  border-bottom: 2px solid #A7B4D6 !important; /* mais contraste no claro */
}

/* SISTEMA (coluna 1) – mantém laranja + negrito nos dois temas */
thead th:nth-child(1), tbody td:nth-child(1),
body.light thead th:nth-child(1), body.light tbody td:nth-child(1){
  color:#FF7A00 !important;
  font-weight:700 !important;
}

/* PLANTÃO (coluna 3) – mantém laranja + negrito nos dois temas */
thead th:nth-child(3), tbody td:nth-child(3),
body.light thead th:nth-child(3), body.light tbody td:nth-child(3){
  color:#FF7A00 !important;
  font-weight:700 !important;
}

/* OBS (coluna 6): verde neon no escuro e LARANJA no claro */
thead th:nth-child(6), tbody td:nth-child(6){
  color:#39FF14 !important; /* escuro (default) */
}
body.light thead th:nth-child(6), body.light tbody td:nth-child(6){
  color:#FF7A00 !important; /* laranja no claro */
}
</style>

</head>

      <div class="scroller">
        <table>

          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>

    const state = { rows:[], columns:[], filtered:[], sort:[], visible:new Set() };

    function setOptions(select, values){
      const uniq = Array.from(new Set(values.filter(v => (v ?? '').toString().trim() !== ''))).sort((a,b)=>(''+a).localeCompare(''+b));
      select.innerHTML = '<option value="__ALL__">(Todos)</option>' + uniq.map(v => `<option value="${String(v).replaceAll('"','&quot;')}">${v}</option>`).join('');
    }
    function cmp(a,b){ if(a==null && b==null) return 0; if(a==null) return -1; if(b==null) return 1; const sa=String(a).toLowerCase(); const sb=String(b).toLowerCase(); if(sa<sb) return -1; if(sa>sb) return 1; return 0; }
    function applySort(list){ if(!state.sort.length) return list; const keys=state.sort.map(s=>s.key); const dirs=state.sort.map(s=>s.dir); return [...list].sort((ra,rb)=>{ for(let i=0;i<keys.length;i++){ const k=keys[i]; const d=dirs[i]; const r=cmp(ra[k], rb[k]); if(r!==0) return r*d; } return 0; }); }

    function renderColPicker(){
      const grid = $('#colGrid');
      grid.innerHTML = state.columns.map(c => { const checked = state.visible.has(c) ? 'checked' : ''; return `<label><input type="checkbox" data-col="${c}" ${checked}/> ${c}</label>`; }).join('');
      grid.querySelectorAll('input[type="checkbox"]').forEach(cb => {

    }

    function render(){
      const thead = $('#thead'); const tbody = $('#tbody');
      const s = $('#fSistema').value; const f = $('#fFila').value; const p = $('#fPlantao').value; const m = $('#fManager').value; const q = $('#q').value;
      state.filtered = state.rows.filter(r => {
        if(s !== '__ALL__' && String(r['SISTEMA']||'') !== s) return false;
        if(f !== '__ALL__' && String(r['FILA/REGRA ITSM']||'') !== f) return false;
        if(p !== '__ALL__' && String(r['PLANTÃO']||'') !== p) return false;
        if(m !== '__ALL__' && String(r['MANAGER']||'') !== m) return false;
        if(!passesSearch(r,q)) return false;
        return true;
      });
      const sorted = applySort(state.filtered);
      const vis = state.columns.filter(c => state.visible.has(c));
      thead.innerHTML = '<tr>' + vis.map(c => { const idx = state.sort.findIndex(s => s.key===c); let badge=''; if(idx>=0){ const dir = state.sort[idx].dir===1 ? '▲' : '▼'; badge = `<span class="badge">${dir}${idx+1}</span>`; } return `<th data-col="${c}"><div class="thflex"><span>${c}</span>${badge}</div></th>`; }).join('') + '</tr>';
      tbody.innerHTML = sorted.map(r => '<tr>' + vis.map(c => `<td>${(r[c] ?? '')}</td>`).join('') + '</tr>').join('');
      thead.querySelectorAll('th').forEach(th => {
        th.addEventListener('click', (ev)=>{
          const col = th.getAttribute('data-col');
          const multi = ev.shiftKey || ev.ctrlKey || ev.metaKey;
          const curIdx = state.sort.findIndex(s => s.key===col);
          if(!multi){ state.sort = []; }
          if(curIdx===-1){ state.sort.push({key:col, dir:1}); }
          else { const cur = state.sort[curIdx]; cur.dir = (cur.dir===1? -1 : 1); if(!multi){ state.sort=[cur]; } }
          render();
        });
      });
    }

    function buildRows(){
      state.rows = RAW_ROWS.map(r => {
        const out = {...r};
        Object.entries(COL_RENAME).forEach(([oldK,newK]) => { if(oldK in out){ out[newK] = out[oldK]; delete out[oldK]; } });
        Object.keys(out).forEach(k => { if(HIDE_COLS.has(String(k).toLowerCase())) delete out[k]; });
        return out;
      });
    }

    function buildColumns(){
      state.columns = state.rows.length ? Object.keys(state.rows[0]) : [];
      const ordered = Array.from(new Set([...ORDER_PREF, ...state.columns]));
      state.columns = ordered.filter(c => state.columns.includes(c));
      state.columns = state.columns.filter(c => !HIDE_COLS.has(String(c).toLowerCase()));
      state.visible = new Set(state.columns);
    }

    function clearAll(){
      $('#fSistema').value='__ALL__';
      $('#fFila').value='__ALL__';
      $('#fPlantao').value='__ALL__';
      $('#fManager').value='__ALL__';
      $('#q').value='';
      state.sort = [];
      state.visible = new Set(state.columns);
      renderColPicker();
      render();
    }

    function init(){
      buildRows();
      buildColumns();
      setOptions($('#fSistema'), state.rows.map(r => r['SISTEMA']));
      setOptions($('#fFila'), state.rows.map(r => r['FILA/REGRA ITSM']));
      setOptions($('#fPlantao'), state.rows.map(r => r['PLANTÃO']));
      setOptions($('#fManager'), state.rows.map(r => r['MANAGER']));
      renderColPicker();
      render();
    }

    document.addEventListener('DOMContentLoaded', ()=>{
      init();
      document.getElementById('export').addEventListener('click', () => {
        const rows = state.filtered && state.filtered.length ? state.filtered : state.rows;
        const vis = state.columns.filter(c => state.visible.has(c));
        const trimmed = rows.map(r => Object.fromEntries(vis.map(c => [c, r[c]])));
        const ws = XLSX.utils.json_to_sheet(trimmed, {header: vis});
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Filtrado');
        XLSX.writeFile(wb, 'BASE DE FILAS E ACIONAMENTOS MESA TECH 2026.xlsx');
      });
      document.getElementById('colsBtn').addEventListener('click', ()=>{ const p = document.getElementById('colPicker'); p.classList.toggle('show');});
      document.addEventListener('click', (e)=>{ const p=document.getElementById('colPicker'); if(!p.contains(e.target) && e.target.id!=='colsBtn'){ p.classList.remove('show'); } });
      document.getElementById('colAll').addEventListener('click', ()=>{ state.columns.forEach(c=>state.visible.add(c)); renderColPicker(); render(); });
      document.getElementById('colNone').addEventListener('click', ()=>{ state.visible.clear(); renderColPicker(); render(); });
      ['fSistema','fFila','fPlantao','fManager'].forEach(id => document.getElementById(id).addEventListener('change', render));
      document.getElementById('q').addEventListener('input', render);
      document.getElementById('clear').addEventListener('click', clearAll);
    });
  </script>

<script>
(()=>{
 const fm=document.getElementById('fm');
 document.getElementById('toggleMenu').onclick=()=>fm.classList.toggle('collapsed');
 const btnT=document.getElementById('toggleTheme');
 const bI=document.getElementById('incFont');
 const bD=document.getElementById('decFont');
 let fs=100;
 btnT.onclick=()=>document.body.classList.toggle('light');
 bI.onclick=()=>{fs+=10; document.body.style.fontSize=fs+'%';};
 bD.onclick=()=>{fs-=10; document.body.style.fontSize=fs+'%';};
})();
</script>
<script>

/* === Acessibilidade e Tema === */
(function(){
  if (window.__a11yInit) return; window.__a11yInit = true;

  const root = document.documentElement;
  const body = document.body;

  const btnToggleMenu = document.getElementById('toggleMenu');
  const btnToggleTheme = document.getElementById('toggleTheme');
  const btnInc = document.getElementById('incFont');
  const btnDec = document.getElementById('decFont');

  const STORAGE_KEYS = {
    scale: 'a11y_font_scale',
    theme: 'ui_theme' // 'light' | 'dark'
  };

  // Estado inicial
  let scale = parseFloat(localStorage.getItem(STORAGE_KEYS.scale) || '1');
  if (isNaN(scale)) scale = 1;
  applyScale(scale);

  const savedTheme = localStorage.getItem(STORAGE_KEYS.theme);
  if (savedTheme === 'light') body.classList.add('light');
  if (savedTheme === 'dark') body.classList.remove('light');

  // Handlers
  if (btnToggleMenu) btnToggleMenu.onclick = () => {
    document.getElementById('fm')?.classList.toggle('collapsed');
  };

  if (btnToggleTheme) btnToggleTheme.onclick = () => {
    body.classList.toggle('light');
    const isLight = body.classList.contains('light');
    localStorage.setItem(STORAGE_KEYS.theme, isLight ? 'light' : 'dark');
  };

  if (btnInc) btnInc.onclick = () => {
    updateScale(step(+0.1));
  };
  if (btnDec) btnDec.onclick = () => {
    updateScale(step(-0.1));
  };

  function step(delta){
    // limitar entre 0.8x e 1.8x
    const next = Math.min(1.8, Math.max(0.8, round(scale + delta, 2)));
    return next;
  }

  function updateScale(next){
    scale = next;
    applyScale(scale);
    localStorage.setItem(STORAGE_KEYS.scale, String(scale));
  }

  function applyScale(s){
    root.style.setProperty('--font-scale', String(s));
  }

  function round(n, p){ const m = Math.pow(10,p); return Math.round(n*m)/m; }

})();

</script>
